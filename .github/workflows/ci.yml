name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install GNOME tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-bin gnome-shell

      - name: Run smoke tests
        run: ./scripts/smoke-test.sh
